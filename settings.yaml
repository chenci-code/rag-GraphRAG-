### LLM settings ###
completion_models:
  default_completion_model:
    model_provider: openai
    api_base: https://api.deepseek.com/v1   # 🔗 直连你充了钱的 DeepSeek 官方原生接口
    model: deepseek-chat                    # 🤖 使用旗舰级的 DeepSeek-V3 帮你狂抽图谱和关键词描述
    auth_method: api_key
    api_key: ${DEEPSEEK_API_KEY}            # 🔒 安全读取 .env
    concurrent_requests: 4                  # DeepSeek 官方并发支持很好
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: openai
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1 # 🔗 指向你的阿里云百炼接口
    model: text-embedding-v3               # 👁️ 阿里百炼王牌向量模型
    auth_method: api_key
    api_key: ${DASHSCOPE_API_KEY}           # 🔒 安全读取 .env 里的百炼密钥
    # 🌟🌟 核心降维打击：强行把发给百炼的包裹掐成 1 条，彻底终结 400 报错！
    batch_size: 1
    concurrent_requests: 1
    retry:
      type: exponential_backoff

### Document processing settings ###
input:
  type: text
  file_pattern: ".*\\.(txt|md)$$"

chunking:
  type: tokens
  size: 800
  overlap: 100
  encoding_model: o200k_base

### Storage settings ###
input_storage:
  type: file
  base_dir: "input"

output_storage:
  type: file
  base_dir: "output"

reporting:
  type: file
  base_dir: "logs"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

vector_store:
  type: lancedb
  db_uri: output\lancedb

### Workflow settings ###
embed_text:
  enabled: true
  batch_size: 10

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"
  entity_types: [organization,person,geo,event]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: true
  embeddings: true

### Query settings ###
local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
